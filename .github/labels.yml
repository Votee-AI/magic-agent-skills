# GitHub label taxonomy for MAGIC Agent Skills.
# Sync with:  gh label clone (or github-label-sync / probot-settings) — these are GitHub
# *repo* labels, distinct from Linear project labels.
# Format: - name: <label>  (optional: color, description, aliases)

# ── Type ───────────────────────────────────────────────────────
- name: "type: bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "type: feature"
  color: "a2eeef"
  description: "New functionality or enhancement"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation improvement"
- name: "type: refactor"
  color: "c5def5"
  description: "Code restructuring, no behavior change"
- name: "type: test"
  color: "bfdadc"
  description: "Test coverage or harness improvement"
- name: "type: chore"
  color: "cfd3d7"
  description: "Maintenance, deps, tooling"
- name: "type: skill-proposal"
  color: "5319e7"
  description: "Proposes a new skill or major skill change"

# ── Domain ─────────────────────────────────────────────────────
- name: "domain: data"
  color: "1d76db"
  description: "Data-agent skills (magic-data-*)"
- name: "domain: linguistic"
  color: "0e8a16"
  description: "Computational-linguistics skills (magic-linguistic-*)"
- name: "domain: cli"
  color: "fbca04"
  description: "CLI installer (@votee-ai/magic-agent-skills)"
- name: "domain: ci-cd"
  color: "e99695"
  description: "CI/CD, release, automation"
- name: "domain: infra"
  color: "b60205"
  description: "Repository infrastructure / governance"

