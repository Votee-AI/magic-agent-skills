name: Release
on:
  push:
    tags: ["v*"]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-npm:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install CLI dependencies
        run: cd cli && npm ci
      - name: Bundle skills and commands
        run: cd cli && bash scripts/copy-skills.sh
      - name: Build TypeScript
        run: cd cli && npm run build
      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./cli/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "FAIL: Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"
      - name: Publish to npm with provenance
        run: cd cli && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            # skills.sh (universal)
            npx skills add Votee-AI/magic-agent-skills

            # Custom CLI (granular selection)
            npx @votee-ai/magic-agent-skills init

            # Claude Code native plugin
            /plugin marketplace add Votee-AI/magic-agent-skills
            ```
