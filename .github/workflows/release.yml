name: Release
on:
  push:
    tags: ["v*"]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-npm:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install CLI dependencies
        run: cd cli && npm ci
      - name: Bundle skills and commands
        run: cd cli && bash scripts/copy-skills.sh
      - name: Build TypeScript
        run: cd cli && npm run build
      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./cli/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "FAIL: Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"
      - name: Publish to npm with provenance
        run: cd cli && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Generate SBOMs (Software Bill of Materials) for both ecosystems and attach to the release.
  # Provenance (above) attests build integrity; SBOM enumerates the full dependency tree so
  # downstream adopters/legal can audit transitive obligations. Runs in parallel with publish.
  sbom:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate CLI SBOM (npm, CycloneDX)
        run: |
          cd cli && npm ci && npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-format JSON --output-file ../sbom-cli.cdx.json
      - name: Generate skills SBOM (pip, CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements --infile ../requirements.txt \
            --output-format json --output-file ../sbom-skills.cdx.json
      - name: Convert to SPDX (parallel format) for portability
        run: |
          npm install -g @cyclonedx/cyclonedx-cli
          for f in sbom-cli sbom-skills; do
            cyclonedx convert --input-file $f.cdx.json --output-file $f.spdx.json --output-format spdxjson || \
              echo "WARN: SPDX conversion for $f skipped (tooling optional)"
          done
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-*.cdx.json
            sbom-*.spdx.json
          if-no-files-found: error
          retention-days: 90

  github-release:
    needs: [publish-npm, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sbom/*.cdx.json
            sbom/*.spdx.json
          body: |
            ## Install

            ```bash
            # skills.sh (universal)
            npx skills add Votee-AI/magic-agent-skills

            # Custom CLI (granular selection)
            npx @votee-ai/magic-agent-skills init

            # Claude Code native plugin
            /plugin marketplace add Votee-AI/magic-agent-skills
            ```
