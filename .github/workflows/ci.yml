name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Structural tests (all 30 skills)
        run: MPLBACKEND=Agg pytest tests/shared/ -q --tb=short
      - name: Data-agent unit tests
        run: MPLBACKEND=Agg pytest tests/data-agent/unit/ -q --tb=short
      - name: Linguistic unit tests
        run: MPLBACKEND=Agg pytest tests/linguistic/unit/ -q --tb=short
      - name: Integration tests
        run: MPLBACKEND=Agg pytest tests/data-agent/integration/ tests/linguistic/integration/ -q --tb=short

  cli-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: cd cli && npm ci
      - name: Bundle skills and commands
        run: cd cli && bash scripts/copy-skills.sh
      - name: Build TypeScript
        run: cd cli && npm run build
      - name: Run CLI tests
        run: cd cli && npm test

  eval-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate eval JSON structure
        run: python tests/data-agent/e2e/evals/run_evals.py --all --dry-run

  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install ajv-cli and js-yaml
        run: |
          npm install -g ajv-cli ajv-formats
          npm install js-yaml
      - name: Validate SKILL.schema.json is valid JSON Schema
        run: ajv compile -s schema/SKILL.schema.json
      - name: Extract and validate all SKILL.md frontmatters
        run: |
          set -e
          FAILED=0
          for skill_dir in skills/*/; do
            SKILL_MD="$skill_dir/SKILL.md"
            if [ ! -f "$SKILL_MD" ]; then continue; fi
            DIR_NAME=$(basename "$skill_dir")
            if [[ "$DIR_NAME" == _* ]]; then continue; fi
            echo "Validating: $SKILL_MD"
            node -e "
              const yaml = require('js-yaml');
              const fs = require('fs');
              const content = fs.readFileSync('$SKILL_MD', 'utf8');
              const match = content.match(/^---\n([\s\S]*?)\n---/);
              if (!match) { console.error('No frontmatter found in $SKILL_MD'); process.exit(1); }
              const doc = yaml.load(match[1]);
              if (doc.name !== '$DIR_NAME') {
                console.error('Name mismatch: frontmatter has \"' + doc.name + '\" but directory is \"$DIR_NAME\"');
                process.exit(1);
              }
              fs.writeFileSync('/tmp/frontmatter.json', JSON.stringify(doc, null, 2));
            " || { echo "FAIL: Cannot parse YAML in $SKILL_MD"; FAILED=1; continue; }
            ajv validate -s schema/SKILL.schema.json -d /tmp/frontmatter.json || FAILED=1
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Schema validation FAILED"
            exit 1
          fi
          echo "All SKILL.md frontmatters validated successfully"

  methodology-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate methodology templates
        run: |
          shopt -s globstar nullglob
          FOUND=0
          FAILED=0
          for tmpl in skills/magic-data-synthesis/methodologies/stages/**/*.md; do
            [ "$(basename "$tmpl")" = "README.md" ] && continue
            [ "$(basename "$tmpl")" = "_template.md" ] && continue
            FOUND=$((FOUND + 1))
            echo "Validating: $tmpl"
            for section in "Stage" "Source" "When to Use" "Pipeline Stages" "Quality Rubric"; do
              if ! grep -q "^## $section" "$tmpl"; then
                echo "FAIL: $tmpl missing required section: ## $section"
                FAILED=1
              fi
            done
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "WARN: No methodology templates found (expected in Phase 2+)"
          else
            echo "Validated $FOUND methodology templates"
          fi
          exit $FAILED

  marketplace-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate marketplace.json skill paths exist
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            let failed = 0;
            let total = 0;
            for (const plugin of m.plugins) {
              for (const skillPath of plugin.skills) {
                total++;
                const dir = skillPath.replace('./', '');
                if (!fs.existsSync(dir)) {
                  console.error('Missing skill directory:', dir);
                  failed++;
                }
              }
            }
            if (failed > 0) {
              console.error(failed + ' of ' + total + ' skill paths are missing');
              process.exit(1);
            }
            console.log('All ' + total + ' skill paths valid');
          "

  package-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: cd cli && npm ci
      - name: Prepare package bundle
        run: cd cli && bash scripts/copy-skills.sh
      - name: Verify bundle contents
        run: |
          cd cli
          find skills commands -type f 2>/dev/null | sort > /tmp/pack-output.txt
          cat /tmp/pack-output.txt
          if [ ! -f skills/manifest.json ]; then
            echo "FAIL: skills/manifest.json not generated"
            exit 1
          fi
          DATA_COUNT=$(node -e "const m=JSON.parse(require('fs').readFileSync('skills/manifest.json','utf8')); console.log(m.suites.data.skills.length)")
          LING_COUNT=$(node -e "const m=JSON.parse(require('fs').readFileSync('skills/manifest.json','utf8')); console.log(m.suites.linguistic.skills.length)")
          echo "Data skills in manifest: $DATA_COUNT"
          echo "Linguistic skills in manifest: $LING_COUNT"
          [ "$DATA_COUNT" -ge 12 ] || { echo "FAIL: Expected 12+ data skills, got $DATA_COUNT"; exit 1; }
          [ "$LING_COUNT" -ge 18 ] || { echo "FAIL: Expected 18+ linguistic skills, got $LING_COUNT"; exit 1; }
          FORBIDDEN="evals/ test-workspace/ .cache/ __pycache__ .omc/ openspec/ ref/"
          for pattern in $FORBIDDEN; do
            if grep -q "$pattern" /tmp/pack-output.txt; then
              echo "FAIL: Bundle contains forbidden path: $pattern"
              exit 1
            fi
          done
          FILE_COUNT=$(wc -l < /tmp/pack-output.txt)
          echo "Bundle file count: $FILE_COUNT"
          if [ "$FILE_COUNT" -gt 500 ]; then
            echo "FAIL: Bundle has $FILE_COUNT files (max 500)"
            exit 1
          fi
          echo "PASS: Bundle contents verified"

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-licenses
      - run: pip install -r requirements.txt
      - name: Check for prohibited licenses
        run: |
          pip-licenses --format=markdown --with-urls \
            --fail-on="GNU General Public License;AGPL;Server Side Public License;Business Source License;Commons Clause"
